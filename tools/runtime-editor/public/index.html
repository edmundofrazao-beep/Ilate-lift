<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ILATE Runtime Editor</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070b14;
        --panel: #101827;
        --panel-2: #0b111d;
        --line: #253149;
        --text: #f5f7fb;
        --muted: #93a0b8;
        --orange: #f97316;
        --green: #34d399;
        --red: #fb7185;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(circle at top left, #172036 0, var(--bg) 36rem);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(11, 17, 29, 0.88);
        backdrop-filter: blur(12px);
      }
      h1 { margin: 0; font-size: 20px; letter-spacing: -0.03em; }
      .tag { color: var(--orange); font-size: 11px; font-weight: 900; letter-spacing: 0.24em; text-transform: uppercase; }
      main {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr) 320px;
        gap: 16px;
        padding: 16px;
        height: calc(100vh - 72px);
      }
      aside, section {
        min-height: 0;
        border: 1px solid var(--line);
        background: rgba(16, 24, 39, 0.92);
      }
      aside { padding: 16px; overflow: auto; }
      section { display: flex; flex-direction: column; }
      button {
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
        padding: 10px 12px;
        font-weight: 900;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
      }
      button:hover { border-color: var(--orange); color: var(--orange); }
      button.primary { background: var(--orange); border-color: var(--orange); color: #111827; }
      button.file {
        width: 100%;
        text-align: left;
        margin-bottom: 8px;
      }
      button.file.active { border-color: var(--orange); color: var(--orange); background: rgba(249, 115, 22, 0.1); }
      textarea {
        flex: 1;
        width: 100%;
        min-height: 0;
        resize: none;
        border: 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        outline: none;
        padding: 18px;
        background: #050914;
        color: #e5e7eb;
        font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        padding: 12px;
      }
      .muted { color: var(--muted); font-size: 13px; line-height: 1.5; }
      .status {
        white-space: pre-wrap;
        border: 1px solid var(--line);
        background: #050914;
        padding: 12px;
        min-height: 160px;
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        background: #050914;
        color: var(--text);
        padding: 10px;
        margin: 10px 0;
      }
      .ok { color: var(--green); }
      .err { color: var(--red); }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="tag">ILATE v1.1 runtime</div>
        <h1>Local Runtime Editor</h1>
      </div>
      <button class="primary" id="refresh">Refresh</button>
    </header>
    <main>
      <aside>
        <div class="tag">Runtime files</div>
        <p class="muted">Only files in <strong>public/runtime</strong> are editable here.</p>
        <div id="files"></div>
      </aside>
      <section>
        <div class="toolbar">
          <div>
            <div class="tag">Editor</div>
            <div id="current" class="muted">Select a JSON file.</div>
          </div>
          <div>
            <button id="format">Format</button>
            <button class="primary" id="save">Save</button>
          </div>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
      </section>
      <aside>
        <div class="tag">Git bridge</div>
        <p class="muted">Commit and push runtime edits to the <strong>v1.1</strong> branch.</p>
        <input id="message" value="Update v1.1 runtime configuration" />
        <button id="status">Git Status</button>
        <button id="commit">Commit</button>
        <button class="primary" id="push">Push v1.1</button>
        <h3>Status</h3>
        <div class="status" id="log"></div>
      </aside>
    </main>
    <script>
      const filesEl = document.getElementById('files');
      const editor = document.getElementById('editor');
      const currentEl = document.getElementById('current');
      const logEl = document.getElementById('log');
      let currentFile = null;

      const log = (text, cls = '') => {
        logEl.innerHTML = `<span class="${cls}">${String(text).replace(/[&<>]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))}</span>`;
      };

      const api = async (url, options) => {
        const response = await fetch(url, options);
        const payload = await response.json().catch(() => null);
        if (!response.ok) throw new Error(payload?.error || response.statusText);
        return payload;
      };

      const loadFiles = async () => {
        const files = await api('/api/runtime/files');
        filesEl.innerHTML = '';
        files.forEach(file => {
          const button = document.createElement('button');
          button.className = `file ${file === currentFile ? 'active' : ''}`;
          button.textContent = file;
          button.onclick = () => loadFile(file);
          filesEl.appendChild(button);
        });
      };

      const loadFile = async (file) => {
        currentFile = file;
        const response = await fetch(`/api/runtime/file?path=${encodeURIComponent(file)}`);
        editor.value = await response.text();
        currentEl.textContent = file;
        await loadFiles();
        log(`Loaded ${file}`, 'ok');
      };

      document.getElementById('format').onclick = () => {
        try {
          editor.value = `${JSON.stringify(JSON.parse(editor.value), null, 2)}\n`;
          log('JSON formatted.', 'ok');
        } catch (error) {
          log(error.message, 'err');
        }
      };

      document.getElementById('save').onclick = async () => {
        if (!currentFile) return log('Select a file first.', 'err');
        try {
          await api('/api/runtime/file', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: currentFile, content: editor.value })
          });
          log(`Saved ${currentFile}`, 'ok');
        } catch (error) {
          log(error.message, 'err');
        }
      };

      document.getElementById('status').onclick = async () => {
        try {
          const result = await api('/api/git/status');
          log(`branch: ${result.branch}\n${result.status || 'clean'}`);
        } catch (error) {
          log(error.message, 'err');
        }
      };

      document.getElementById('commit').onclick = async () => {
        try {
          const result = await api('/api/git/commit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: document.getElementById('message').value })
          });
          log(result.output || 'Committed.', 'ok');
        } catch (error) {
          log(error.message, 'err');
        }
      };

      document.getElementById('push').onclick = async () => {
        try {
          const result = await api('/api/git/push', { method: 'POST' });
          log(result.output || 'Pushed.', 'ok');
        } catch (error) {
          log(error.message, 'err');
        }
      };

      document.getElementById('refresh').onclick = loadFiles;
      loadFiles();
    </script>
  </body>
</html>
