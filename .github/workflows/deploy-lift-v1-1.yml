name: Deploy ILATE Lift v1.1

on:
  push:
    branches:
      - v1.1
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to /lift-1-1 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ILATE_FTP_SERVER }}
          username: ${{ secrets.ILATE_FTP_USERNAME }}
          password: ${{ secrets.ILATE_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: dist/
          server-dir: /public_html/lift-1-1/
          dangerous-clean-slate: true
